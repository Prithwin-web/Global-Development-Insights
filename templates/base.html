<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Global Development Insights{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body>

  <!-- ══════════════════ SIDEBAR ══════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <i class="bi bi-globe2"></i>
      </div>
      <span class="brand-name">GDI</span>
    </div>

    <div class="sidebar-section-label">OVERVIEW</div>

    <nav class="sidebar-nav">
      <a href="{{ url_for('index') }}"
         class="sidebar-link {% if request.endpoint == 'index' %}active{% endif %}">
        <i class="bi bi-house-door"></i>
        <span>Dashboard</span>
      </a>
      <a href="#" class="sidebar-link">
        <i class="bi bi-bar-chart-line"></i>
        <span>Analytics</span>
      </a>
      <a href="#" class="sidebar-link">
        <i class="bi bi-graph-up-arrow"></i>
        <span>Forecast</span>
      </a>
      <a href="#" class="sidebar-link">
        <i class="bi bi-globe-americas"></i>
        <span>World Map</span>
      </a>
    </nav>

    <div class="sidebar-section-label mt-3">ANALYSIS</div>

    <nav class="sidebar-nav">
      <a href="#" class="sidebar-link">
        <i class="bi bi-currency-dollar"></i>
        <span>GDP Tracker</span>
        <span class="badge-new">NEW</span>
      </a>
      <a href="#" class="sidebar-link">
        <i class="bi bi-heart-pulse"></i>
        <span>Health Index</span>
      </a>
      <a href="#" class="sidebar-link">
        <i class="bi bi-wifi"></i>
        <span>Digital Access</span>
        <span class="badge-new">NEW</span>
      </a>
      <a href="#" class="sidebar-link">
        <i class="bi bi-book"></i>
        <span>Education</span>
      </a>
      <a href="#" class="sidebar-link">
        <i class="bi bi-briefcase"></i>
        <span>Employment</span>
      </a>
      <a href="#" class="sidebar-link">
        <i class="bi bi-people"></i>
        <span>Poverty</span>
      </a>
    </nav>

    <div class="sidebar-section-label mt-3">REPORTS</div>

    <nav class="sidebar-nav">
      <a href="#" class="sidebar-link">
        <i class="bi bi-file-earmark-bar-graph"></i>
        <span>Export Report</span>
      </a>
      <a href="#" class="sidebar-link">
        <i class="bi bi-gear"></i>
        <span>Settings</span>
      </a>
    </nav>
  </aside>

  <!-- ══════════════════ MAIN WRAPPER ══════════════════ -->
  <div class="main-wrapper">

    <!-- TOP NAV -->
    <header class="topnav">
      <div class="topnav-left">
        <button class="sidebar-toggle" id="sidebarToggle">
          <i class="bi bi-list"></i>
        </button>
        <div class="topnav-search">
          <form action="{{ url_for('search') }}" method="POST">
            <i class="bi bi-search search-icon-top"></i>
            <input type="text" name="country_name"
                   placeholder="Search country…"
                   class="topnav-search-input"
                   autocomplete="off"/>
          </form>
        </div>
      </div>
      <div class="topnav-right">
        <button class="icon-btn"><i class="bi bi-bell"></i><span class="dot dot-yellow"></span></button>
        <button class="icon-btn"><i class="bi bi-envelope"></i><span class="dot dot-green"></span></button>
        <button class="icon-btn"><i class="bi bi-moon"></i></button>
        <div class="avatar">GD</div>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="page-content">
      {% block content %}{% endblock %}
    </main>

  </div><!-- /main-wrapper -->

  <!-- Sidebar toggle script (no jQuery, pure vanilla) -->
  <script>
    document.getElementById('sidebarToggle').addEventListener('click', function () {
      document.getElementById('sidebar').classList.toggle('collapsed');
      document.querySelector('.main-wrapper').classList.toggle('expanded');
    });
  </script>
</body>
</html>
